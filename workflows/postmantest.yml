name: Benlar API Regression Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar Tests Newman (BUC - Sincronización)
        # Usamos el script que definimos en el package.json
        run: npm run test:buc
        continue-on-error: true # Permite que el reporte se genere aunque fallen tests

      - name: Instalar Allure CLI
        run: npm install -g allure-commandline

      - name: Generar Reporte Allure
        run: allure generate allure-results --clean -o allure-report

      - name: Subir Reporte como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-artifact
          path: allure-report/
          retention-days: 5