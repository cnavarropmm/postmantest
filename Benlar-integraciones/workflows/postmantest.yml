name: Benlar API Automation

on:
  push:
    branches: [ main, master ] # Se ejecuta al subir cambios
  workflow_dispatch:          # Esto hace que aparezca un botón "Run workflow" manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Newman Tests
        run: npm run test:buc
        continue-on-error: true # Importante para que genere el reporte aunque fallen tests

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-allure-benlar
          path: allure-report/