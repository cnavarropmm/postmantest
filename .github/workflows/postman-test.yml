name: Benlar API Automation

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug Exact Folder Name
        run: |
          jq -r '.item[] | select(.name == "QA") | .item[].name' Benlar-integraciones/BUC-Sincronizacion.json

      - name: Run Newman Tests
        run: npm run test:buc
        continue-on-error: true

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-allure-benlar
          # Aquí también indicamos la ruta completa a la carpeta de resultados
          path: postmantest/benlar-integraciones/allure-report/